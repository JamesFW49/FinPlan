<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>FinPlan</title>
<meta name="description" content="Your personal financial planner — money tracker, debt tracker, investments, and live forecasts." />

<!-- PWA install metadata -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#080C10" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FinPlan" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" href="icon-192.png" />

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background:#080C10; }
  body { overscroll-behavior-y: none; }
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:#0E1419; }
  ::-webkit-scrollbar-thumb { background:#263344; border-radius:4px; }
  input:focus, select:focus, button:focus-visible { outline:2px solid #10E5A0 !important; outline-offset:1px; }
  input[type=date]::-webkit-calendar-picker-indicator { filter:invert(0.6); }
  #root { min-height:100vh; }
  #boot { position:fixed; inset:0; background:#080C10; display:flex; align-items:center; justify-content:center; z-index:9999; }
  #boot .mark { width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#10E5A0,#38BDF8);display:flex;align-items:center;justify-content:center;font-size:24px;color:#040810;font-weight:900;font-family:system-ui; }
  #fatal-error { display:none; position:fixed; inset:0; background:#080C10; color:#F0F6FF; padding:24px; font-family:system-ui; }
  #fatal-error.show { display:block; }
  #fatal-error h2 { color:#F43F5E; }
  #fatal-error pre { background:#0E1419; padding:16px; border-radius:8px; overflow:auto; font-size:12px; color:#8BA3BE; }
</style>
</head>
<body>

<div id="boot"><div class="mark">£</div></div>
<div id="root"></div>
<div id="fatal-error">
  <h2>Something went wrong loading FinPlan</h2>
  <p>Your data is safe — it's stored on this device and hasn't been touched. Try reloading the page. If this keeps happening, check your internet connection (the app needs it on first load to fetch React).</p>
  <pre id="fatal-error-detail"></pre>
</div>

<!-- React and ReactDOM are loaded dynamically via JavaScript below (not as
     static script src attributes) specifically so the version-pinned CDN URL
     never appears as literal text containing an at-sign in the HTML source.
     Some hosting and email-protection systems rewrite at-sign patterns found
     in static HTML, which silently broke the script URL in an earlier version
     of this app. Building the URL in JS at runtime avoids that entirely. -->
<script>
  (function () {
    var AT = String.fromCharCode(64); // builds the at-sign character at runtime
    var REACT_VERSION = "18.3.1";
    var base = "https://unpkg.com/react" + AT + REACT_VERSION + "/umd/react.production.min.js";
    var domBase = "https://unpkg.com/react-dom" + AT + REACT_VERSION + "/umd/react-dom.production.min.js";

    // Firebase SDK via gstatic (no at-sign in URL — version is in the path)
    var FB_VER = "10.13.2";
    var fbBase = "https://www.gstatic.com/firebasejs/" + FB_VER + "/";
    var firebaseScripts = [
      fbBase + "firebase-app-compat.js",
      fbBase + "firebase-firestore-compat.js",
    ];

    function showFatal(msg) {
      var el = document.getElementById("fatal-error");
      var detail = document.getElementById("fatal-error-detail");
      if (el && detail) { detail.textContent = msg; el.className = "show"; }
      var boot = document.getElementById("boot");
      if (boot) boot.style.display = "none";
    }

    function loadScript(src, onload, onerror) {
      var s = document.createElement("script");
      s.src = src;
      s.crossOrigin = "anonymous";
      s.onload = onload;
      s.onerror = onerror || function() { showFatal("Failed to load: " + src); };
      document.head.appendChild(s);
    }

    function loadAll(srcs, onDone) {
      if (!srcs.length) { onDone(); return; }
      loadScript(srcs[0], function() { loadAll(srcs.slice(1), onDone); });
    }

    function initFirebase() {
      var firebaseConfig = {
        apiKey: "AIzaSyDi5KbSNvXBKLQJ6DxoTD0XhPOawOQFjig",
        authDomain: "finplan-da077.firebaseapp.com",
        projectId: "finplan-da077",
        storageBucket: "finplan-da077.firebasestorage.app",
        messagingSenderId: "179251747325",
        appId: "1:179251747325:web:1a9f0aad035f37d2517f74",
        measurementId: "G-F8DWB3ZHN5"
      };
      firebase.initializeApp(firebaseConfig);
    }

    loadScript(base, function() {
      loadScript(domBase, function() {
        loadAll(firebaseScripts, function() {
          initFirebase();
          loadScript("app.js", null, function() {
            showFatal("Failed to load app.js. Check your internet connection and reload.");
          });
        });
      }, function() { showFatal("Failed to load React DOM. Check connection."); });
    }, function() { showFatal("Failed to load React. Check connection."); });
  })();
</script>

<script>
  window.addEventListener("error", function (e) {
    var el = document.getElementById("fatal-error");
    var detail = document.getElementById("fatal-error-detail");
    if (el && detail && !document.getElementById("root").hasChildNodes()) {
      detail.textContent = (e.message || "Unknown error") + "\n" + (e.filename ? (e.filename + ":" + e.lineno) : "");
      el.className = "show";
      var boot = document.getElementById("boot");
      if (boot) boot.style.display = "none";
    }
  });

  window.addEventListener("DOMContentLoaded", function () {
    setTimeout(function () {
      var b = document.getElementById("boot");
      if (b) b.style.display = "none";
    }, 50);
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
</body>
</html>
